# Fly.io deployment configuration
app = "prospectiq"
primary_region = "sjc"  # San Jose, CA (change as needed)

[build]
  dockerfile = "Dockerfile"

[env]
  API_HOST = "0.0.0.0"
  API_PORT = "8000"
  ENVIRONMENT = "production"
  DEBUG = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "30s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
    method = "get"
    path = "/health"
    protocol = "http"

# VM configuration
[vm]
  cpu_kind = "shared"
  cpus = 2
  memory_gb = 2

# Auto-scaling
[scaling]
  min_count = 1
  max_count = 4

# PostgreSQL connection (set via fly secrets)
# fly secrets set DATABASE_URL="postgresql://..."
# fly secrets set OPENAI_API_KEY="sk-..."
# fly secrets set JWT_SECRET_KEY="..."
