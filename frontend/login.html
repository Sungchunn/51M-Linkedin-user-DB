<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PROSPECTIQ</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--background);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom right, var(--background), var(--surface), var(--background));
            opacity: 0.8;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 1;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .login-subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-input:hover {
            border-color: var(--border-hover);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px rgba(115, 115, 115, 0.08);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .login-button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            border: 1px solid var(--border-hover);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease-out, height 0.6s ease-out;
            z-index: 0;
        }

        .login-button:hover::before {
            width: 400px;
            height: 400px;
        }

        .login-button:hover {
            background: var(--primary-hover);
            box-shadow:
                0 0 40px rgba(250, 250, 250, 0.4),
                0 0 80px rgba(250, 250, 250, 0.2),
                0 0 120px rgba(250, 250, 250, 0.1),
                var(--shadow-md);
            border-color: var(--text-primary);
            transform: translateY(-2px);
        }

        .login-button:active {
            transform: translateY(1px);
        }

        .login-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: var(--shadow-sm);
        }

        .login-button:disabled:hover {
            transform: none;
            box-shadow: var(--shadow-sm);
            border-color: var(--border-hover);
        }

        .login-button:disabled::before {
            display: none;
        }

        .form-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .form-footer-text {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-footer-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .form-footer-link:hover {
            color: var(--text-primary);
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .toggle-mode {
            text-align: center;
            margin-top: 20px;
        }

        .toggle-button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            transition: color 0.2s;
            padding: 8px 16px;
            border-radius: 6px;
        }

        .toggle-button:hover {
            color: var(--text-primary);
            background: var(--surface-hover);
        }

        .toggle-button strong {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">PROSPECTIQ</div>
                <div class="login-subtitle" id="modeSubtitle">Sign in to your account</div>
            </div>

            <div id="alertBox" class="alert"></div>

            <form id="authForm">
                <div class="form-group" id="fullNameGroup" style="display: none;">
                    <label class="form-label" for="fullName">Full Name</label>
                    <input type="text" id="fullName" class="form-input" placeholder="John Doe">
                </div>

                <div class="form-group" id="emailGroup" style="display: none;">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter your username" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>

                <div class="form-group" id="confirmPasswordGroup" style="display: none;">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter your password">
                </div>

                <button type="submit" id="submitBtn" class="login-button">Sign In</button>
            </form>

            <div class="toggle-mode">
                <button type="button" class="toggle-button" id="toggleMode">
                    <span id="toggleText">Don't have an account? <strong>Sign up</strong></span>
                </button>
            </div>

            <div class="form-footer">
                <p class="form-footer-text">
                    <a href="index.html" class="form-footer-link">← Back to Search</a>
                </p>
            </div>
        </div>
    </div>

    <script src="squares-bg.js"></script>
    <script src="auth.js?v=20251022b"></script>
</body>
</html>
