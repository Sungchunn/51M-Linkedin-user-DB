<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Key Creation</title>
    <style>
        body {
            font-family: monospace;
            background: #0a0a0a;
            color: #fafafa;
            padding: 20px;
        }
        .section {
            background: #151515;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            background: #262626;
            border: 1px solid #404040;
            color: #fafafa;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background: #2d2d2d;
        }
        input {
            padding: 8px;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            color: #fafafa;
            width: 300px;
            border-radius: 4px;
        }
        pre {
            background: #0a0a0a;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <h1>API Key Creation Test</h1>

    <div class="section">
        <h2>Step 1: Login</h2>
        <input type="text" id="username" placeholder="Username" value="admin"><br><br>
        <input type="password" id="password" placeholder="Password" value="admin123"><br><br>
        <button onclick="testLogin()">Login</button>
        <div id="loginResult"></div>
    </div>

    <div class="section">
        <h2>Step 2: Create API Key</h2>
        <input type="text" id="keyName" placeholder="Key Name" value="Test Key"><br><br>
        <button onclick="testCreateKey()">Create API Key</button>
        <div id="createResult"></div>
    </div>

    <div class="section">
        <h2>Step 3: List API Keys</h2>
        <button onclick="testListKeys()">List API Keys</button>
        <div id="listResult"></div>
    </div>

    <script>
        let accessToken = null;

        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('loginResult');

            resultDiv.innerHTML = '<p>Testing login...</p>';

            try {
                const response = await fetch('http://localhost:8000/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    accessToken = data.access_token;
                    resultDiv.innerHTML = `
                        <p class="success">✅ Login successful!</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                    localStorage.setItem('access_token', accessToken);
                } else {
                    resultDiv.innerHTML = `
                        <p class="error">❌ Login failed</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
            }
        }

        async function testCreateKey() {
            if (!accessToken) {
                accessToken = localStorage.getItem('access_token');
            }

            if (!accessToken) {
                alert('Please login first!');
                return;
            }

            const keyName = document.getElementById('keyName').value;
            const resultDiv = document.getElementById('createResult');

            resultDiv.innerHTML = '<p>Creating API key...</p>';

            try {
                const response = await fetch('http://localhost:8000/auth/api-keys', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        key_name: keyName,
                        scopes: ['search:read', 'export:read'],
                        tier: 'basic'
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <p class="success">✅ API Key created!</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                        <p style="color: #ff6b6b;">⚠️ Save this key! It won't be shown again:</p>
                        <p style="background: #0a0a0a; padding: 10px; border-radius: 4px; word-break: break-all;">${data.api_key}</p>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <p class="error">❌ Failed to create API key</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
            }
        }

        async function testListKeys() {
            if (!accessToken) {
                accessToken = localStorage.getItem('access_token');
            }

            if (!accessToken) {
                alert('Please login first!');
                return;
            }

            const resultDiv = document.getElementById('listResult');

            resultDiv.innerHTML = '<p>Loading API keys...</p>';

            try {
                const response = await fetch('http://localhost:8000/auth/api-keys', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <p class="success">✅ Found ${data.length} API key(s)</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <p class="error">❌ Failed to list API keys</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
            }
        }

        // Auto-load token on page load
        window.addEventListener('DOMContentLoaded', () => {
            accessToken = localStorage.getItem('access_token');
            if (accessToken) {
                document.getElementById('loginResult').innerHTML = '<p class="success">✅ Token found in localStorage</p>';
            }
        });
    </script>
</body>
</html>
